name: Push to Docker Hub

on:
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/agentnxxt/agentspace
  DOCKERHUB_IMAGE: thefractionalpm/agentspace

jobs:
  push-to-dockerhub:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull from GHCR and push to Docker Hub (amd64)
        run: |
          docker pull --platform linux/amd64 ${{ env.GHCR_IMAGE }}:build-linux-amd64
          docker tag ${{ env.GHCR_IMAGE }}:build-linux-amd64 ${{ env.DOCKERHUB_IMAGE }}:latest
          docker push ${{ env.DOCKERHUB_IMAGE }}:latest
